<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F&B Revenue Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--surface:#fff;--border:#e2e0da;--border2:#ccc9c0;
  --text:#1a1a18;--muted:#6b6960;--accent:#1a1a18;--radius:10px;
  --weekend-bg:#eef4ff;--top-bg:#fffbea;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center}
.login-card h1{font-size:18px;font-weight:600;margin-bottom:4px}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.login-card input{width:100%;padding:10px 14px;border:1px solid var(--border2);border-radius:8px;font-size:14px;margin-bottom:10px;outline:none;background:var(--bg)}
.login-card input:focus{border-color:var(--accent)}
.login-card button{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.login-card button:hover{opacity:.88}
#login-error{font-size:12px;color:#c0392b;margin-top:8px;min-height:16px}

/* App shell */
#app{display:none}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;gap:10px;flex-wrap:wrap}
header h1{font-size:15px;font-weight:600}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* Tab bar */
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0;overflow-x:auto;position:sticky;top:49px;z-index:19;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{font-size:12px;font-weight:500;padding:10px 14px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:var(--muted);white-space:nowrap;transition:color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.month-select{font-size:12px;border:1px solid var(--border2);border-radius:6px;padding:5px 10px;background:var(--bg);color:var(--text);cursor:pointer;outline:none}
.paste-btn-area{margin-left:auto;display:flex;align-items:center;gap:8px}

/* Panels */
main{max-width:1040px;margin:0 auto;padding:20px 16px 60px}
.panel{display:none}
.panel.active{display:block}

/* Paste */
.paste-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px}
.paste-section label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
.paste-section textarea{width:100%;height:70px;font-family:'Courier New',monospace;font-size:11px;border:1px solid var(--border2);border-radius:8px;padding:8px;resize:vertical;background:var(--bg);outline:none}
.paste-section textarea:focus{border-color:var(--accent)}
.paste-row{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
#status{font-size:12px;color:var(--muted);flex:1}
#status.ok{color:#2e7d32}
#status.err{color:#c0392b}

/* Cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:16px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px}
.metric-card .label{font-size:10px;color:var(--muted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.metric-card .value{font-size:17px;font-weight:600}
.card-note{font-size:10px;color:var(--muted);margin-bottom:10px}

/* Chart section */
.chart-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px}
.sec-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.toggles{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tog-btn{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;gap:4px;color:var(--muted)}
.tog-btn .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chart-wrap{position:relative;width:100%;height:270px}

/* Table */
.table-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.table-header{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;border-radius:var(--radius) var(--radius) 0 0}
.legend-row{display:flex;gap:12px;font-size:11px;color:var(--muted);align-items:center}
.leg-sw{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:3px;vertical-align:middle}
.table-wrap{overflow-x:auto;border-radius:0 0 var(--radius) var(--radius)}
table{width:100%;border-collapse:collapse;min-width:500px}
th{text-align:right;padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg);text-transform:uppercase;letter-spacing:.04em}
th:first-child{text-align:left}
td{text-align:right;padding:6px 10px;font-size:12px;border-bottom:1px solid var(--border)}
td:first-child{text-align:left;font-size:11px}
tr:last-child td{border-bottom:none}
tr.weekend td{background:var(--weekend-bg)}
tr.weekend td:first-child{color:#3a5aa8;font-weight:500}
tr:not(.weekend):hover td{background:#f9f8f5}
tr.weekend:hover td{background:#e4eefb}
td.tc{font-weight:600}
td.top{background:var(--top-bg);font-weight:600;position:relative}
td.top::after{content:'★';font-size:7px;color:#c8a000;position:absolute;top:3px;right:3px}
.empty-state{text-align:center;padding:36px 20px;color:var(--muted);font-size:13px}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--text);background:#e8e7e3}
th.sort-asc::after{content:' ↑';font-size:10px;opacity:.7}
th.sort-desc::after{content:' ↓';font-size:10px;opacity:.7}
.period-label{font-size:10px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.period-label select{font-size:11px;border:1px solid var(--border2);border-radius:5px;padding:2px 6px;background:var(--bg);cursor:pointer}
td.date-cell{white-space:nowrap;font-size:12px;color:var(--muted)}
td.sticky-date,th.sticky-date{position:sticky;left:0;z-index:2;background:var(--surface);white-space:nowrap;font-size:12px}
tr.weekend td.sticky-date{background:var(--weekend-bg);color:#3a5aa8;font-weight:500}
tr:not(.weekend):hover td.sticky-date{background:#f9f8f5}
tr.weekend:hover td.sticky-date{background:#e4eefb}
th.sticky-date{background:var(--bg);text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
td.capture{font-size:12px;color:#2a7a50;font-weight:500}
td.capture-high{font-size:12px;color:#c94a20;font-weight:600}
tr.has-note td{background:rgba(245,158,11,0.06)}
tr.has-note.weekend td{background:rgba(245,158,11,0.1)}
tr.has-note td.sticky-date,tr.has-note td.date-cell{box-shadow:inset 3px 0 0 #f59e0b}
td.date-cell,td.sticky-date{cursor:pointer}
td.date-cell:hover,td.sticky-date:hover{text-decoration:underline;text-underline-offset:2px}
.note-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#f59e0b;vertical-align:middle;margin-left:5px;flex-shrink:0}
#note-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center}
#edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-bottom:14px}
.edit-field label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px}
.edit-field input{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:6px;font-size:13px;outline:none;background:var(--bg);box-sizing:border-box}
.edit-field input:focus{border-color:var(--accent)}
.edit-field.full{grid-column:1/-1}
.edit-pencil{display:inline-block;opacity:0;font-size:10px;margin-left:5px;cursor:pointer;color:var(--muted);transition:opacity .15s}
tr:hover .edit-pencil{opacity:1}
.fc-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.fc-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.fc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.fc-card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.fc-stat{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.fc-stat:last-child{border-bottom:none}
.fc-stat-val{font-weight:600}
.fc-calc-box{background:var(--bg);border-radius:8px;padding:10px 14px;margin:10px 0}
.fc-calc-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.fc-form-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.fc-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;margin-bottom:12px}
.fc-fi label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px}
.fc-fi input{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:6px;font-size:13px;outline:none;background:var(--bg);box-sizing:border-box}
.fc-fi input:focus{border-color:var(--accent)}
.fc-fi.span2{grid-column:1/-1}
.fc-hint{font-size:10px;color:var(--muted);margin-top:2px}
.cmp-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.cmp-block-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.cmp-outlet-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:8px 16px 4px}
.cmp-table-wrap{overflow-x:auto}
.cmp-table{width:100%;border-collapse:collapse;font-size:12px;min-width:480px}
.cmp-table th{text-align:right;padding:6px 12px;font-size:10px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.cmp-table th:first-child{text-align:left;width:90px}
.cmp-table td{text-align:right;padding:6px 12px;border-bottom:1px solid var(--border)}
.cmp-table td:first-child{text-align:left;font-weight:600;font-size:11px;color:var(--muted)}
.cmp-table tr.actual-row td,.cmp-table tr.actual-row td:first-child{color:#2a7a50}
.cmp-table tr.var-row td{font-size:11px}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-pos{color:#2a7a50;font-weight:600}
.cmp-neg{color:#c0392b;font-weight:600}
.no-data-note{text-align:center;padding:36px 20px;color:var(--muted);font-size:13px}

/* Buttons */
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-primary:hover{opacity:.85}
.btn-ghost{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;cursor:pointer;white-space:nowrap}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border2);border-radius:6px;padding:4px 10px;cursor:pointer}
.btn-danger:hover{border-color:#c0392b;color:#c0392b}
#import-input{display:none}
.footer-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;padding:0 2px}
.footer-row span{font-size:11px;color:var(--muted)}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>F&B Revenue Tracker</h1>
    <p>1 Hotel Melbourne</p>
    <input type="password" id="pw-input" placeholder="Password">
    <button onclick="checkPw()">Sign in</button>
    <div id="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <h1>F&B Revenue Tracker</h1>
    <div class="header-right">
      <span id="day-count" style="font-size:12px;color:var(--muted)"></span>
      <button class="btn-ghost" onclick="exportData()">Export JSON ↓</button>
      <button class="btn-ghost" onclick="exportExcel()">Export Excel ↓</button>
      <button class="btn-ghost" onclick="document.getElementById('import-input').click()">Import ↑</button>
      <input type="file" id="import-input" accept=".json" onchange="importData(event)">
      <button class="btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </header>

  <div class="tab-bar" id="tab-bar"></div>

  <main>
    <div class="toolbar">
      <select class="month-select" id="month-filter" onchange="renderCurrent()">
        <option value="all">All months</option>
      </select>
      <span id="filter-count" style="font-size:12px;color:var(--muted)"></span>
    </div>

    <div class="paste-section">
      <label>Paste full DOR sheet (Ctrl+A → Ctrl+C from Excel, then paste) — all outlets extracted automatically</label>
      <textarea id="paste-area" placeholder="Paste DOR data here..."></textarea>
      <div class="paste-row">
        <button class="btn-primary" onclick="extractAndAdd()">Add day →</button>
        <span id="status"></span>
      </div>
    </div>

    <div id="panels"></div>

    <div class="footer-row">
      <span id="footer-count"></span>
      <button class="btn-danger" onclick="clearAll()">Clear all data</button>
    </div>
  </main>
</div>

<script>
const PASSWORD = 'Ird@2026!';
const STORE_KEY = 'fb_days_v2';
const SESSION_KEY = 'fb_auth';

const OUTLETS = [
  { key:'fromhere',   label:'From Here by Mike', short:'From Here', section:'From Here by Mike', total:'Total From Here by Mike', color:'#e8960e' },
  { key:'cranebar',   label:'Crane Bar',          short:'Crane Bar',  section:'Crane Bar',         total:'Total Crane Bar',         color:'#1a9e6e' },
  { key:'upstairs',   label:'Upstairs',           short:'Upstairs',   section:'Upstairs',          total:'Total Upstairs',          color:'#2e7dd4' },
  { key:'neighbours', label:'Neighbours',         short:'Neighbours', section:'Neighbours',        total:'Total Neighbours',        color:'#7060cc' },
  { key:'ird',        label:'In-Room Dining',     short:'IRD',        section:'In-Room Dining',    total:'Total In-Room Dining',    color:'#c94a20' },
  { key:'banquets',   label:'Banquets',           short:'Banquets',   section:'Banquets',          total:'Total Banquets',          color:'#2a7a50' },
  { key:'catering',   label:'Catering',           short:'Catering',   section:'Catering',          total:'Total Catering',          color:'#8b4ab8' },
];

const OUTLET_SERIES = [
  { k:'breakfast_revenue', lb:'Breakfast', co:'#f59e0b', d:[] },
  { k:'lunch_revenue',     lb:'Lunch',      co:'#10b981', d:[] },
  { k:'dinner_revenue',    lb:'Dinner',     co:'#3b82f6', d:[] },
  { k:'other_revenue',     lb:'Other',      co:'#a855f7', d:[] },
  { k:'total_food_revenue',lb:'Food total', co:'#ef4444', d:[5,3] },
  { k:'beverage_revenue',  lb:'Beverage',   co:'#6366f1', d:[] },
  { k:'surcharges',        lb:'Surcharges', co:'#9ca3af', d:[2,3] },
  { k:'total_revenue',     lb:'Total',      co:'#111827', d:[], w:2.5 },
];

const OUTLET_TABLE_COLS = [
  { k:'breakfast_revenue', h:'Bfst $' },
  { k:'lunch_revenue',     h:'Lunch $' },
  { k:'dinner_revenue',    h:'Din $' },
  { k:'other_revenue',     h:'Other $' },
  { k:'total_food_revenue',h:'Food $' },
  { k:'beverage_revenue',  h:'Bev $' },
  { k:'surcharges',        h:'Surcharges' },
  { k:'total_revenue',     h:'Total', isTc:true },
  { k:'total_covers',      h:'Covers', noTop:true, noFmt:true },
];

const DASH_TABLE_COLS = OUTLETS.map(o => ({ k:o.key, h:o.short, isTc: o.key==='ird' }))
  .concat([{ k:'total_fb', h:'Total F&B', isTc:true }]);

let days = [];
let currentTab = 'dashboard';

// ── Occupancy state ──
const OCC_KEY='occ_days_v1';
let occDays=[];
function loadOccDays(){try{const r=localStorage.getItem(OCC_KEY);occDays=r?JSON.parse(r):[];occDays.sort((a,b)=>a.date.localeCompare(b.date));}catch(e){occDays=[];}}
function saveOccDays(){localStorage.setItem(OCC_KEY,JSON.stringify(occDays));}
function getOccForDate(date){return occDays.find(d=>d.date===date)||null;}
function getOccFiltered(){const v=document.getElementById('month-filter')?.value||'all';return v==='all'?occDays:occDays.filter(d=>getMonthKey(d.date)===v);}
function calcMTDAvg(date){
  const [y,m]=date.split('-');
  const monthSoFar=occDays.filter(d=>d.date.slice(0,7)===y+'-'+m&&d.date<=date);
  return monthSoFar.length?monthSoFar.reduce((s,d)=>s+d.occ,0)/monthSoFar.length:0;
}
let charts = {};
let sortState = { col:'date', dir:'desc' }; // applies to current tab's table
let outletSortState = {}; // per outlet key

function getSortState(key){ return key==='dashboard' ? sortState : (outletSortState[key]||{col:'date',dir:'desc'}); }
function setSortState(key,col){
  const s=getSortState(key);
  if (s.col===col) s.dir=s.dir==='desc'?'asc':'desc'; else {s.col=col;s.dir='desc';}
  if (key==='dashboard') sortState=s; else outletSortState[key]=s;
  renderCurrent();
}
function sortRows(rows,col,dir,key){
  return [...rows].sort((a,b)=>{
    let av,bv;
    if (col==='date'){av=a.date;bv=b.date;}
    else if (col==='total_fb'){av=a.total_fb||0;bv=b.total_fb||0;}
    else if (col==='total_guests'){const ao=getOccForDate(a.date),bo=getOccForDate(b.date);av=ao?ao.total_guests:0;bv=bo?bo.total_guests:0;}
    else if (col==='capture_pct'){const ao=getOccForDate(a.date),bo=getOccForDate(b.date);av=ao&&ao.total_guests?(a.outlets[key].total_covers||0)/ao.total_guests:0;bv=bo&&bo.total_guests?(b.outlets[key].total_covers||0)/bo.total_guests:0;}
    else if (key){av=a.outlets[key][col]||0;bv=b.outlets[key][col]||0;}
    else{av=a.outlets[col]?.total_revenue||0;bv=b.outlets[col]?.total_revenue||0;}
    if (typeof av==='string') return dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
    return dir==='asc'?av-bv:bv-av;
  });
}
function thSort(tabKey,col,label,state){
  const active=state.col===col;
  const cls='sortable'+(active?' sort-'+state.dir:'');
  return '<th class="'+cls+'" onclick="setSortState(\''+tabKey+'\',\''+col+'\')">'+label+'</th>';
}
function fmtDateShort(d){
  if(!d)return'';
  const[y,m,dy]=d.split('-');
  const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return (+dy)+' '+mn[+m-1]+' '+(+y%100 < 10?'0'+(+y%100):+y%100);
}
const activeSeriesMap = { dashboard: new Set(OUTLETS.map(o => o.key)) };
OUTLETS.forEach(o => { activeSeriesMap[o.key] = new Set(OUTLET_SERIES.map(s => s.k)); });
const occChartActive = { occ:true, mtd:true, guests:true, density:true };
const GUEST_SERIES = { k:'guests', lb:'Guests', co:'#7060cc', d:[], isGuest:true };
const guestInitialized = new Set(); // tracks which outlet tabs have had guests added at least once

function togOccChart(key){
  occChartActive[key]=!occChartActive[key];
  renderOccupancy();
}

// ── Notes ──
const NOTES_KEY='notes_v1';
let notes={};
function loadNotes(){try{const r=localStorage.getItem(NOTES_KEY);notes=r?JSON.parse(r):{};}catch(e){notes={};}}
function saveNotes(){localStorage.setItem(NOTES_KEY,JSON.stringify(notes));}
function openNote(date){
  document.getElementById('note-date').textContent=date;
  document.getElementById('note-text').value=notes[date]||'';
  document.getElementById('note-modal').style.display='flex';
  setTimeout(()=>document.getElementById('note-text').focus(),50);
}
function closeNote(){document.getElementById('note-modal').style.display='none';}
function saveNote(){
  const date=document.getElementById('note-date').textContent;
  const text=document.getElementById('note-text').value.trim();
  if(text) notes[date]=text; else delete notes[date];
  saveNotes(); closeNote(); renderCurrent();
}
function deleteNote(){
  const date=document.getElementById('note-date').textContent;
  delete notes[date]; saveNotes(); closeNote(); renderCurrent();
}
function noteDot(date){
  const n=notes[date]; if(!n) return '';

// ── Storage ──
function loadDays() {
  try { const r=localStorage.getItem(STORE_KEY); days=r?JSON.parse(r):[]; days.sort((a,b)=>a.date.localeCompare(b.date)); }
  catch(e) { days=[]; }
}
function saveDays() { localStorage.setItem(STORE_KEY,JSON.stringify(days)); }

// ── Export / Import ──
function exportData() {
  if (!days.length&&!occDays.length) { alert('No data to export yet.'); return; }
  const payload={exported:new Date().toISOString(),days,occDays,notes,forecasts};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='fb-data-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
}
function importData(e) {
  const file=e.target.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try {
      const parsed=JSON.parse(ev.target.result);
      let fbAdded=0,fbUpdated=0,occAdded=0,occUpdated=0,notesCount=0;

      // F&B days
      const importedDays=parsed.days||(Array.isArray(parsed)?parsed:[]);
      importedDays.forEach(d=>{
        if (!d.date) return;
        const ex=days.find(x=>x.date===d.date);
        if (ex){Object.assign(ex,d);fbUpdated++;} else {days.push(d);fbAdded++;}
      });
      days.sort((a,b)=>a.date.localeCompare(b.date));
      saveDays();

      // Occupancy days
      if(parsed.occDays&&Array.isArray(parsed.occDays)){
        parsed.occDays.forEach(d=>{
          if (!d.date) return;
          const ex=occDays.find(x=>x.date===d.date);
          if (ex){Object.assign(ex,d);occUpdated++;} else {occDays.push(d);occAdded++;}
        });
        occDays.sort((a,b)=>a.date.localeCompare(b.date));
        saveOccDays();
      }

      // Notes
      if(parsed.notes&&typeof parsed.notes==='object'){
        Object.entries(parsed.notes).forEach(([date,text])=>{
          notes[date]=text; notesCount++;
        });
        saveNotes();
      }

      // Forecasts
      if(parsed.forecasts&&typeof parsed.forecasts==='object'){
        Object.entries(parsed.forecasts).forEach(([mk,fc])=>{forecasts[mk]=fc;});
        saveForecasts();
      }

      updateMonthFilter(); renderCurrent();
      const msg='F&B: '+fbAdded+' new, '+fbUpdated+' updated'
        +(occAdded||occUpdated?' | Occ: '+occAdded+' new, '+occUpdated+' updated':'')
        +(notesCount?' | '+notesCount+' notes restored':'');
      setStatus(msg,'ok');
    } catch(err){alert('Could not read file: '+err.message);}
    e.target.value='';
  };
  reader.readAsText(file);
}

// ── Parser ──
function parseNum(s) {
  if (!s) return 0; s=s.trim().replace(/,/g,'');
  if (!s||s==='-'||s==='#DIV/0!') return 0;
  if (s.startsWith('(')&&s.endsWith(')')) return -(parseFloat(s.slice(1,-1))||0);
  return parseFloat(s)||0;
}
function makeEmptyOutlet(){
  return {breakfast_covers:0,breakfast_avg_check:0,breakfast_revenue:0,
    lunch_covers:0,lunch_avg_check:0,lunch_revenue:0,
    dinner_covers:0,dinner_avg_check:0,dinner_revenue:0,
    other_covers:0,other_avg_check:0,other_revenue:0,
    food_allowances:0,total_food_revenue:0,
    beverage_revenue:0,beverage_allowances:0,total_beverage_revenue:0,
    surcharges:0,total_covers:0,total_avg_check:0,total_revenue:0};
}

const SECTION_MAP = new Map(OUTLETS.map(o=>[o.section,o.key]));
const TOTAL_MAP   = new Map(OUTLETS.map(o=>[o.total,o.key]));
const ROW_LABELS  = new Set(['Breakfast','Lunch','Dinner','Other',
  'Less: Food Allowances','Total Food Revenue','Beverage Revenue',
  'Less: Beverage Allowances','Total Beverage Revenue']);

function parseDOR(text) {
  const dm=text.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (!dm) return null;
  const date=dm[3]+'-'+dm[1]+'-'+dm[2];
  const outlets={};
  OUTLETS.forEach(o=>{outlets[o.key]=makeEmptyOutlet();});
  let curOutlet=null, total_fb=0;

  for (const line of text.split(/\r?\n/)) {
    const cells=line.split('\t');
    let found=false;
    for (let i=0;i<cells.length;i++) {
      const t=cells[i].trim();
      if (!t) continue;

      // Section header?
      if (SECTION_MAP.has(t)) { curOutlet=SECTION_MAP.get(t); found=true; break; }

      // Total row?
      if (TOTAL_MAP.has(t)) {
        const key=TOTAL_MAP.get(t);
        outlets[key].total_covers=parseNum(cells[1]);
        outlets[key].total_avg_check=parseNum(cells[2]);
        outlets[key].total_revenue=parseNum(cells[3]);
        curOutlet=null; found=true; break;
      }

      // Grand total?
      if (t==='TOTAL FOOD & BEVERAGE REVENUE') {
        total_fb=parseNum(cells[3]); found=true; break;
      }

      // Data row within outlet?
      // cells[1]=actual covers, cells[2]=actual avg, cells[3]=actual revenue — fixed positions
      // always read actuals from here regardless of what forecast/budget columns contain
      if (curOutlet && (ROW_LABELS.has(t)||t.startsWith('Food and Beverage Surcharges'))) {
        const ot=outlets[curOutlet];
        const ac=parseNum(cells[1]), aa=parseNum(cells[2]), ar=parseNum(cells[3]);
        if      (t==='Breakfast')               {ot.breakfast_covers=ac;ot.breakfast_avg_check=aa;ot.breakfast_revenue=ar;}
        else if (t==='Lunch')                   {ot.lunch_covers=ac;ot.lunch_avg_check=aa;ot.lunch_revenue=ar;}
        else if (t==='Dinner')                  {ot.dinner_covers=ac;ot.dinner_avg_check=aa;ot.dinner_revenue=ar;}
        else if (t==='Other')                   {ot.other_covers=ac;ot.other_avg_check=aa;ot.other_revenue=ar;}
        else if (t==='Less: Food Allowances')   {ot.food_allowances=ar;}
        else if (t==='Total Food Revenue')      {ot.total_food_revenue=ar;}
        else if (t==='Beverage Revenue')        {ot.beverage_revenue=ar;}
        else if (t==='Less: Beverage Allowances'){ot.beverage_allowances=ar;}
        else if (t==='Total Beverage Revenue')  {ot.total_beverage_revenue=ar;}
        else if (t.startsWith('Food and Beverage Surcharges')){ot.surcharges=ar;}
        found=true; break;
      }
    }
  }
  return {date,outlets,total_fb};
}

function extractAndAdd() {
  const raw=document.getElementById('paste-area').value;
  if (!raw.trim()){setStatus('Paste some data first.','err');return;}
  try {
    const d=parseDOR(raw);
    if (!d){setStatus('Could not find a date — include header rows.','err');return;}
    const anyData=OUTLETS.some(o=>d.outlets[o.key].total_revenue>0);
    if (!anyData){setStatus('All zeros parsed — check paste includes outlet sections.','err');return;}
    days=days.filter(x=>x.date!==d.date); days.push(d);
    days.sort((a,b)=>a.date.localeCompare(b.date));
    saveDays(); document.getElementById('paste-area').value='';
    setStatus('Added '+d.date+' — Total F&B: '+fmt(d.total_fb),'ok');
    updateMonthFilter(); renderCurrent(); updateCounts();
  } catch(e){setStatus('Parse error: '+e.message,'err');}
}
function setStatus(msg,type){const el=document.getElementById('status');el.textContent=msg;el.className=type||'';}

// ── Helpers ──
const fmt=n=>'$'+Math.round(n||0).toLocaleString();
const fmtD=d=>{if(!d)return'';const[y,m,dy]=d.split('-');return(+dy)+'/'+(+m);};
function getMonthKey(d){return d.slice(0,7);}
function getMonthLabel(mk){const[y,m]=mk.split('-');return new Date(+y,+m-1,1).toLocaleString('en-AU',{month:'long',year:'numeric'});}
function isWeekend(d){const dt=new Date(d+'T00:00:00');return dt.getDay()===0||dt.getDay()===6;}
function getFiltered(){const v=document.getElementById('month-filter')?.value||'all';return v==='all'?days:days.filter(d=>getMonthKey(d.date)===v);}
function getTopVals(rows,keys){
  const tops={};
  keys.forEach(k=>{const vals=rows.map(r=>r[k]||0);tops[k]=vals.length?Math.max(...vals):0;});
  return tops;
}
function updateMonthFilter(){
  const sel=document.getElementById('month-filter'); const cur=sel.value;
  const months=[...new Set([...days.map(d=>getMonthKey(d.date)),...occDays.map(d=>getMonthKey(d.date))])].sort();
  sel.innerHTML='<option value="all">All months</option>'+months.map(mk=>'<option value="'+mk+'"'+(mk===cur?' selected':'')+'>'+getMonthLabel(mk)+'</option>').join('');
}
function updateCounts(){
  const n=days.length; const txt=n?n+' day'+(n>1?'s':'')+' tracked':'';
  document.getElementById('day-count').textContent=txt;
  document.getElementById('footer-count').textContent=txt;
  const f=getFiltered();
  document.getElementById('filter-count').textContent=f.length!==n?'('+f.length+' shown)':'';
}

function switchTab(key){
  currentTab=key;
  const tabs=['dashboard',...OUTLETS.map(o=>o.key),'occupancy','forecast'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',tabs[i]===key));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+key).classList.add('active');
  renderCurrent();
}

// ── Render ──
function renderCurrent(){
  updateCounts();
  if (currentTab==='dashboard') renderDashboard();
  else if (currentTab==='occupancy') renderOccupancy();
  else if (currentTab==='forecast') renderForecast();
  else renderOutlet(currentTab);
}

function renderDashboard(){
  const filtered=getFiltered();
  const cardsEl=document.getElementById('dash-cards');
  const noteEl=document.getElementById('dash-note');
  if (!filtered.length){
    noteEl.textContent='';cardsEl.innerHTML='';
    document.getElementById('dash-table').innerHTML='<div class="empty-state">No data yet — paste a DOR above.</div>';
    renderDashChart([]);renderDashToggles();return;
  }
  const n=filtered.length;
  const range=n===1?fmtDateShort(filtered[0].date):fmtDateShort(filtered[0].date)+' – '+fmtDateShort(filtered[n-1].date);
  noteEl.innerHTML='<span class="period-label">Period total — <b>'+range+'</b> ('+n+' day'+(n>1?'s':'')+')</span>';
  const outletTotals={};
  OUTLETS.forEach(o=>{outletTotals[o.key]=filtered.reduce((s,d)=>s+(d.outlets[o.key].total_revenue||0),0);});
  const fbTotal=filtered.reduce((s,d)=>s+(d.total_fb||0),0);
  cardsEl.innerHTML=OUTLETS.map(o=>'<div class="metric-card"><div class="label">'+o.short+'</div><div class="value">'+fmt(outletTotals[o.key])+'</div></div>').join('')
    +'<div class="metric-card"><div class="label">Total F&B</div><div class="value">'+fmt(fbTotal)+'</div></div>';
  renderDashToggles();renderDashChart(filtered);renderDashTable(filtered);
}

function renderDashToggles(){
  const el=document.getElementById('dash-toggles');
  el.innerHTML=OUTLETS.map(o=>{
    const on=activeSeriesMap.dashboard.has(o.key);
    return '<button class="tog-btn" onclick="togDash(\''+o.key+'\')" style="'+(on?'border-color:'+o.color+';color:'+o.color+';background:'+o.color+'18;':'')+'">'

function togDash(k){activeSeriesMap.dashboard.has(k)?activeSeriesMap.dashboard.delete(k):activeSeriesMap.dashboard.add(k);renderDashToggles();renderDashChart(getFiltered());}

function renderDashChart(filtered){
  const ctx=document.getElementById('dash-chart');
  if (charts.dashboard){charts.dashboard.destroy();delete charts.dashboard;}
  if (!filtered.length) return;
  const datasets=OUTLETS.filter(o=>activeSeriesMap.dashboard.has(o.key)).map(o=>({
    label:o.short, data:filtered.map(d=>Math.round(d.outlets[o.key].total_revenue||0)),
    borderColor:o.color, backgroundColor:o.color+'15', borderWidth:1.5, pointRadius:filtered.length===1?5:2,
    pointHoverRadius:4, tension:0.3, fill:false,
  }));
  charts.dashboard=new Chart(ctx,{type:'line',data:{labels:filtered.map(d=>fmtD(d.date)),datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': $'+c.parsed.y.toLocaleString()}}},
      scales:{x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#888',autoSkip:false,maxRotation:45}},
        y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#888',callback:v=>'$'+v.toLocaleString()}}}}});
}

function renderDashTable(filtered){
  const el=document.getElementById('dash-table');
  if (!filtered.length){el.innerHTML='<div class="empty-state">No data yet.</div>';return;}
  const ss=getSortState('dashboard');
  const sorted=sortRows(filtered,ss.col,ss.dir,null);
  const topVals={};
  OUTLETS.forEach(o=>{topVals[o.key]=Math.max(...filtered.map(d=>d.outlets[o.key].total_revenue||0));});
  topVals.total_fb=Math.max(...filtered.map(d=>d.total_fb||0));
  const head='<th class="sticky-date sortable'+(ss.col==='date'?' sort-'+ss.dir:'')+'" onclick="setSortState(\'dashboard\',\'date\')">Date</th>'
    +OUTLETS.map(o=>thSort('dashboard',o.key,o.short,ss)).join('')
    +thSort('dashboard','total_fb','Total F&B',ss);
  const rowsHtml=sorted.map(d=>{
    const we=isWeekend(d.date);
    const cells=OUTLETS.map(o=>{
      const v=d.outlets[o.key].total_revenue||0;
      const isTop=topVals[o.key]>0&&Math.round(v)===Math.round(topVals[o.key]);
      return '<td'+(isTop?' class="top"':'')+'>'+fmt(v)+'</td>';
    }).join('');
    const tv=d.total_fb||0;const isTTop=topVals.total_fb>0&&Math.round(tv)===Math.round(topVals.total_fb);
    const label=fmtDateShort(d.date)+(we?' <span style="font-size:10px;color:#3a5aa8;font-weight:600;margin-left:3px">WE</span>':'')+noteDot(d.date);
    return '<tr class="'+noteRowClass(d.date,we)+'"><td class="sticky-date" onclick="openNote(\''+d.date+'\')">'+label+'</td>'+cells+'<td class="tc'+(isTTop?' top':'')+'>'+fmt(tv)+'</td></tr>';
  }).join('');
  el.innerHTML='<table style="min-width:760px"><thead><tr>'+head+'</tr></thead><tbody>'+rowsHtml+'</tbody></table>';
}

  const o=OUTLETS.find(x=>x.key===key);

  const cardsEl=document.getElementById(key+'-cards');
  if (!filtered.length){cardsEl.innerHTML='';document.getElementById(key+'-table').innerHTML='<div class="empty-state">No data yet — paste a DOR above.</div>';renderOutletChart(key,[]);renderOutletToggles(key,[]);return;}

  const cardItems=[
    {lb:'Breakfast',v:fmt(tot.bfst)},{lb:'Lunch',v:fmt(tot.lunch)},{lb:'Dinner',v:fmt(tot.din)},
    {lb:'Other',v:fmt(tot.other)},{lb:'Food total',v:fmt(tot.food)},{lb:'Beverage',v:fmt(tot.bev)},
    {lb:'Surcharges',v:fmt(tot.sur)},{lb:'Total',v:fmt(tot.total)},
  ];
  cardsEl.innerHTML=cardItems.map(i=>'<div class="metric-card"><div class="label">'+i.lb+'</div><div class="value">'+i.v+'</div></div>').join('');

  // Determine which series have any data (suppress all-zero)
  const activeSeries=OUTLET_SERIES.filter(s=>{
    if (!activeSeriesMap[key]) return true;
    const hasData=filtered.some(d=>(d.outlets[key][s.k]||0)!==0);
    return hasData;
  });
  // Add guests series for IRD and Neighbours when occ data available
  const guestOutlets=['ird','neighbours'];
  if(guestOutlets.includes(key)&&filtered.some(d=>getOccForDate(d.date))){
    if(!guestInitialized.has(key)){
      activeSeriesMap[key].add('guests');
      guestInitialized.add(key);
    }
    activeSeries.push(GUEST_SERIES);
  }

  renderOutletToggles(key,activeSeries);
  renderOutletChart(key,filtered,activeSeries);
  renderOutletTable(key,filtered);
}

function renderOutletToggles(key,activeSeries){
  const el=document.getElementById(key+'-toggles');
  if (!activeSeries||!activeSeries.length){el.innerHTML='';return;}
  el.innerHTML=activeSeries.map(s=>{
    const on=activeSeriesMap[key]&&activeSeriesMap[key].has(s.k);
    return '<button class="tog-btn" onclick="togOutlet(\''+key+'\',\''+s.k+'\')" style="'+(on?'border-color:'+s.co+';color:'+s.co+';background:'+s.co+'18;':'')+'">'
      +'<span class="dot" style="background:'+(on?s.co:'var(--border2)')+'"></span>'+s.lb+'</button>';
  }).join('');
}

function togOutlet(key,sk){
  if (!activeSeriesMap[key]) activeSeriesMap[key]=new Set(OUTLET_SERIES.map(s=>s.k));
  activeSeriesMap[key].has(sk)?activeSeriesMap[key].delete(sk):activeSeriesMap[key].add(sk);
  renderOutlet(key);
}

}

function renderOutletTable(key,filtered){
  const el=document.getElementById(key+'-table');
  if (!filtered.length){el.innerHTML='<div class="empty-state">No data yet.</div>';return;}
  const ss=getSortState(key);
  const sorted=sortRows(filtered,ss.col,ss.dir,key);
  const outletRows=filtered.map(d=>d.outlets[key]);
  const tops={};
  OUTLET_TABLE_COLS.filter(c=>!c.noTop&&!c.noFmt).forEach(c=>{tops[c.k]=Math.max(...outletRows.map(r=>r[c.k]||0));});
  const visibleCols=OUTLET_TABLE_COLS.filter(c=>{
    if (c.k==='total_revenue'||c.k==='total_covers') return true;
    return outletRows.some(r=>(r[c.k]||0)!==0);
  });
  const hasGuests=filtered.some(d=>getOccForDate(d.date)!==null);
  const showCapture=(key==='ird'||key==='neighbours')&&hasGuests;
  const guestHead=hasGuests?thSort(key,'total_guests','Guests',ss):'';
  const captureHead=showCapture?'<th style="color:#2a7a50">Cap% guests</th><th style="color:#1a6e8e">Cap% rooms</th>':'';
  const head=thSort(key,'date','Date',ss)+guestHead+visibleCols.map(c=>thSort(key,c.k,c.h,ss)).join('')+captureHead;
  const rowsHtml=sorted.map(d=>{
    const ot=d.outlets[key]; const we=isWeekend(d.date);
    const occ=getOccForDate(d.date);
    const guestCell=hasGuests?'<td style="font-weight:500">'+(occ?occ.total_guests.toLocaleString():'—')+'</td>':'';
    const cells=visibleCols.map(c=>{
      const v=ot[c.k]||0;
      const display=c.noFmt?Math.round(v):fmt(v);
      const isTop=!c.noTop&&tops[c.k]>0&&Math.round(v)===Math.round(tops[c.k]);
      const cls=(c.isTc?'tc ':''+(isTop?'top':'')).trim();
      return '<td'+(cls?' class="'+cls+'"':'')+'>'+display+'</td>';
    }).join('');
    const label=fmtDateShort(d.date)+(we?' <span style="font-size:10px;color:#3a5aa8;font-weight:600;margin-left:3px">WE</span>':'')+noteDot(d.date);
    let captureCell='';
    if(showCapture){
      if(occ&&occ.total_guests>0){
        const gPct=Math.round((ot.total_covers/occ.total_guests)*100);
        const rPct=occ.rms_sold>0?Math.round((ot.total_covers/occ.rms_sold)*100):0;
        const gCls=gPct>=30?'capture-high':'capture';
        const rCls=rPct>=30?'capture-high':'capture';
        captureCell='<td class="'+gCls+'">'+gPct+'%</td><td class="'+rCls+'" style="color:#1a6e8e">'+rPct+'%</td>';
      } else { captureCell='<td class="capture">—</td><td class="capture" style="color:#1a6e8e">—</td>'; }
    }
    const pencil='<span class="edit-pencil" onclick="event.stopPropagation();openEditOutlet(\''+d.date+'\',\''+key+'\')" title="Edit values">✎</span>';
    return '<tr class="'+noteRowClass(d.date,we)+'"><td class="date-cell" onclick="openNote(\''+d.date+'\')">'+label+pencil+'</td>'+guestCell+cells+captureCell+'</tr>';
  }).join('');
  el.innerHTML='<table style="min-width:480px"><thead><tr>'+head+'</tr></thead><tbody>'+rowsHtml+'</tbody></table>';
}

  // ── Forecast sheet ──
  if(Object.keys(forecasts).length){
    const fcRows=[['Month','Occ %','Density','Days','Outlet','Covers (F)','Food $ (F)','Bev $ (F)','Surcharges (F)','Total $ (F)','Covers (A)','Food $ (A)','Bev $ (A)','Surcharges (A)','Total $ (A)','Covers Δ%','Total Δ%']];

}

// ── Occupancy Parser ──
function parseOccLine(line){
  const dm=line.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if(!dm) return null;
  const date=dm[3]+'-'+dm[1]+'-'+dm[2];
  const cleaned=line
    .replace(/\d{2}\/\d{2}\/\d{4}/,'')
    .replace(/\([^)]*\)/g,'')
    .replace(/\s*\/\s*/g,' ');
  const nums=(cleaned.match(/[\d,]+\.?\d*/g)||[])
    .map(n=>parseFloat(n.replace(/,/g,''))).filter(n=>!isNaN(n));
  if(nums.length<18) return null;
  // Verified index positions: [2]=Sold [4]=Occ% [13]=Trans [14]=GrpPkup [19]=Adults [20]=Kids
  const adults=nums[19]||0, kids=nums[20]||0;
  return {date, rms_sold:nums[2], occ:nums[4], trans_rms:nums[13], grp_pkup:nums[14], adults, kids, total_guests:adults+kids, density: nums[2]>0?+((adults+kids)/nums[2]).toFixed(2):0};
}

function parseOccReport(text){
  const results=[];
  for(const line of text.split(/\r?\n/)){
    const t=line.trim();
    if(!/^\d{2}\/\d{2}\/\d{4}/.test(t)) continue;
    const p=parseOccLine(t);
    if(p&&p.rms_sold>0) results.push(p);
  }
  return results;
}

function extractOccupancy(){
  const raw=document.getElementById('occ-paste').value;
  const st=document.getElementById('occ-status');
  if(!raw.trim()){st.textContent='Paste some data first.';st.className='err';return;}
  try{
    const parsed=parseOccReport(raw);
    if(!parsed.length){st.textContent='No valid daily rows found — check the paste includes the daily data rows.';st.className='err';return;}
    let added=0,updated=0;
    parsed.forEach(d=>{
      const ex=occDays.find(x=>x.date===d.date);
      if(ex){Object.assign(ex,d);updated++;} else{occDays.push(d);added++;}
    });
    occDays.sort((a,b)=>a.date.localeCompare(b.date));
    saveOccDays(); document.getElementById('occ-paste').value='';
    st.textContent='Added '+added+' days, updated '+updated+'. Total: '+occDays.length+' days.';
    st.className='ok';
    updateMonthFilter(); renderOccupancy();
  }catch(e){st.textContent='Error: '+e.message;st.className='err';}
}

function loadForecasts(){try{const r=localStorage.getItem(FORECAST_KEY);forecasts=r?JSON.parse(r):{};}catch(e){forecasts={};}}
function saveForecasts(){localStorage.setItem(FORECAST_KEY,JSON.stringify(forecasts));}

function daysInMonthFromKey(mk){const[y,m]=mk.split('-');return new Date(+y,+m,0).getDate();}

// Historical model stats for an outlet from all paired days
function getModelStats(outletKey){
  const paired=days.filter(d=>{
    const occ=getOccForDate(d.date);
    const ot=d.outlets[outletKey];
    return occ&&ot&&ot.total_covers>0&&occ.total_guests>0&&ot.total_revenue>0;
  });
  if(!paired.length) return null;
  const avg=arr=>arr.length?arr.reduce((s,v)=>s+v,0)/arr.length:0;
  const captureRates=paired.map(d=>d.outlets[outletKey].total_covers/getOccForDate(d.date).total_guests);
  // Explicit surcharge-inclusive spend per cover: (food + bev + surcharges) / covers
  const spendPerCover=paired.map(d=>{
    const ot=d.outlets[outletKey];
    return (ot.total_food_revenue+ot.total_beverage_revenue+ot.surcharges)/ot.total_covers;
  });
  // P&L avg check: (food + bev only) / covers — matches what's reported
  const spendPerCoverPL=paired.map(d=>{
    const ot=d.outlets[outletKey];
    return (ot.total_food_revenue+ot.total_beverage_revenue)/ot.total_covers;
  });
  // Capture % of rooms sold (covers / rooms_sold)
  const captureOfRooms=paired.map(d=>{
    const occ=getOccForDate(d.date);
    return occ&&occ.rms_sold>0?d.outlets[outletKey].total_covers/occ.rms_sold:null;
  }).filter(v=>v!==null);
  const withRev=paired.filter(d=>d.outlets[outletKey].total_revenue>0);
  const foodSplits=withRev.map(d=>d.outlets[outletKey].total_food_revenue/d.outlets[outletKey].total_revenue);
  const bevSplits=withRev.map(d=>d.outlets[outletKey].total_beverage_revenue/d.outlets[outletKey].total_revenue);
  const otherSplits=withRev.map(d=>d.outlets[outletKey].surcharges/d.outlets[outletKey].total_revenue);
  return{n:paired.length,captureRate:avg(captureRates),captureRateOfRooms:avg(captureOfRooms),spendPerCover:avg(spendPerCover),spendPerCoverPL:avg(spendPerCoverPL),
    foodSplit:avg(foodSplits),bevSplit:avg(bevSplits),otherSplit:avg(otherSplits)};
}

// Monthly actuals summed from daily data
function getMonthActuals(monthKey,outletKey){
  const mDays=days.filter(d=>getMonthKey(d.date)===monthKey);
  if(!mDays.length) return null;
  const ots=mDays.map(d=>d.outlets[outletKey]);
  const totCovers=ots.reduce((s,o)=>s+(o.total_covers||0),0);
  const totFoodRev=ots.reduce((s,o)=>s+(o.total_food_revenue||0),0);
  const totBevRev=ots.reduce((s,o)=>s+(o.total_beverage_revenue||0),0);
  const totSurcharges=ots.reduce((s,o)=>s+(o.surcharges||0),0);
  const totRev=ots.reduce((s,o)=>s+(o.total_revenue||0),0);
  const occM=occDays.filter(d=>getMonthKey(d.date)===monthKey);
  const totGuests=occM.reduce((s,d)=>s+d.total_guests,0);
  const totRmsSold=occM.reduce((s,d)=>s+d.rms_sold,0);
  // P&L avg check (food+bev only, matches what's reported) and true spend (incl. surcharges)
  const avgCheckPL=totCovers>0?(totFoodRev+totBevRev)/totCovers:0;
  const avgPerCover=totCovers>0?(totFoodRev+totBevRev+totSurcharges)/totCovers:0;
  return{days:mDays.length,covers:totCovers,food_rev:totFoodRev,bev_rev:totBevRev,
    other_rev:totSurcharges,total_rev:totRev,avg_check_pl:avgCheckPL,avg_per_cover:avgPerCover,
    capture_rate:totGuests>0?totCovers/totGuests:0,
    capture_rate_rooms:totRmsSold>0?totCovers/totRmsSold:0,guests:totGuests};
}

function calcFcValues(occ,density,dim,capture,apc){
  const rooms=Math.round(occ/100*AVAIL_ROOMS*dim);
  const guests=Math.round(rooms*density);
  const covers=Math.round(guests*capture/100);
  const total=covers*apc;
  return{rooms,guests,covers,total};
}

function updateFcMonthSelector(){
  const sel=document.getElementById('fc-month-sel');
  if(!sel) return;
  const cur=sel.value||fcSelectedMonth;
  const existing=Object.keys(forecasts);
  const now=new Date();
  const future=[];
  for(let i=-1;i<8;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    const mk=d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');
    if(!future.includes(mk)) future.push(mk);
  }
  const all=[...new Set([...existing,...future])].sort();
  sel.innerHTML='<option value="">Select month...</option>'+all.map(mk=>'<option value="'+mk+'"'+(mk===cur?' selected':'')+'>'+getMonthLabel(mk)+'</option>').join('');
  if(cur) sel.value=cur;
}

function gff(id){return parseFloat(document.getElementById(id)?.value)||0;}

function saveForecast(){
  const mk=document.getElementById('fc-month-sel').value;
  if(!mk){alert('Please select a month first.');return;}
  const occ=gff('fc-occ'),density=gff('fc-density'),dim=gff('fc-days');
  const iCapture=gff('fc-ird-capture'),iApc=gff('fc-ird-apc');
  const iFoodSplit=gff('fc-ird-food'),iBevSplit=gff('fc-ird-bev'),iOtherSplit=gff('fc-ird-other');
  const nCapture=gff('fc-n-capture'),nApc=gff('fc-n-apc');
  const ird=calcFcValues(occ,density,dim,iCapture,iApc);
  const nei=calcFcValues(occ,density,dim,nCapture,nApc);
  forecasts[mk]={month:mk,occ_pct:occ,density,days_in_month:dim,
    ird:{capture_rate:iCapture,avg_per_cover:iApc,food_split:iFoodSplit,bev_split:iBevSplit,other_split:iOtherSplit,
      rooms_sold:ird.rooms,guests:ird.guests,covers:ird.covers,total_rev:ird.total,
      food_rev:ird.total*iFoodSplit/100,bev_rev:ird.total*iBevSplit/100,other_rev:ird.total*iOtherSplit/100},
    neighbours:{capture_rate:nCapture,avg_per_cover:nApc,
      rooms_sold:nei.rooms,guests:nei.guests,covers:nei.covers,total_rev:nei.total}};
  saveForecasts();
  document.getElementById('fc-form-panel').style.display='none';
  renderForecast();
}

function deleteForecast(mk){
  if(!confirm('Delete forecast for '+getMonthLabel(mk)+'?')) return;
  delete forecasts[mk];
  saveForecasts();
  renderForecast();
}

// Variance display helper
function varCell(fc,act){
  if(!act&&act!==0) return '<td>—</td>';
  const diff=act-fc, pct=fc!==0?diff/fc*100:0;
  const cls=diff>=0?'cmp-pos':'cmp-neg';
  const sign=diff>=0?'+':'';
  return '<td><span class="'+cls+'">'+sign+pct.toFixed(1)+'%</span></td>';
}
function varCellRev(fc,act){
  if(!act&&act!==0) return '<td>—</td>';
  const diff=act-fc, pct=fc!==0?diff/fc*100:0;
  const cls=diff>=0?'cmp-pos':'cmp-neg';
  const sign=diff>=0?'+':'';
  return '<td><span class="'+cls+'">'+sign+fmt(diff)+'<br><span style="font-size:10px">'+sign+pct.toFixed(1)+'%</span></span></td>';
}

      +'<button class="btn-danger" style="font-size:11px;padding:3px 8px" onclick="deleteForecast(\''+mk+'\')">Delete</button></div></div>'
      +'<div class="cmp-outlet-label" style="color:#c94a20">IRD</div>'
      +'<div class="cmp-table-wrap"><table class="cmp-table"><thead><tr><th></th><th>Covers</th><th>Food $</th><th>Bev $</th><th>Surcharges</th><th>Total $</th><th style="background:#fffbea">Avg/Cover (P&amp;L)</th><th>Avg/Cover (w/tray)</th><th>Cap% guests</th><th style="color:#1a6e8e">Cap% rooms</th></tr></thead><tbody>'+irdRows+'</tbody></table></div>'
      +'<div class="cmp-outlet-label" style="color:#7060cc">Neighbours</div>'
      +'<div class="cmp-table-wrap"><table class="cmp-table"><thead><tr><th></th><th>Covers</th><th>Total $</th><th>Avg/Cover</th><th>Cap% guests</th><th style="color:#1a6e8e">Cap% rooms</th></tr></thead><tbody>'+nRows+'</tbody></table></div>'
      +'</div>';
  }).join('');
}

function clearAll(){
  if (!confirm('Clear all data? This cannot be undone.')) return;
  days=[]; localStorage.removeItem(STORE_KEY);
  Object.values(charts).forEach(c=>c.destroy()); Object.keys(charts).forEach(k=>delete charts[k]);
  document.getElementById('month-filter').innerHTML='<option value="all">All months</option>';
  renderCurrent(); updateCounts(); setStatus('','');
}

function init(){ buildUI(); loadDays(); loadOccDays(); loadNotes(); loadForecasts(); updateMonthFilter(); renderCurrent(); updateCounts(); }

window.addEventListener('DOMContentLoaded',()=>{
  if (sessionStorage.getItem(SESSION_KEY)==='1'){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  }
  document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
});
</script>
<div id="note-modal">
  <div style="background:#fff;border-radius:12px;padding:24px;width:400px;max-width:calc(100% - 40px);box-shadow:0 8px 32px rgba(0,0,0,0.25)">
    <div style="font-size:14px;font-weight:600;color:#1a1a18;margin-bottom:3px">Note — <span id="note-date"></span></div>
    <div style="font-size:11px;color:#6b6960;margin-bottom:12px">Click any date row to add or edit notes. Days with notes show an amber dot.</div>
    <textarea id="note-text" placeholder="e.g. Staff event, low walk-ins, FHBM private dining..." style="width:100%;height:90px;border:1px solid #e2e0da;border-radius:8px;padding:10px;font-size:13px;resize:vertical;font-family:inherit;outline:none;box-sizing:border-box;line-height:1.5"></textarea>
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;align-items:center">
      <button onclick="deleteNote()" style="font-size:12px;color:#c0392b;background:none;border:1px solid #e2e0da;border-radius:6px;padding:6px 12px;cursor:pointer;margin-right:auto">Delete note</button>
      <button onclick="closeNote()" style="font-size:12px;color:#6b6960;background:none;border:1px solid #e2e0da;border-radius:6px;padding:6px 12px;cursor:pointer">Cancel</button>
      <button onclick="saveNote()" style="font-size:12px;color:#fff;background:#1a1a18;border:none;border-radius:6px;padding:6px 16px;font-weight:500;cursor:pointer">Save</button>
    </div>
  </div>
</div>
<div id="edit-modal">
  <div style="background:#fff;border-radius:12px;padding:24px;width:520px;max-width:calc(100% - 32px);max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.25)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div style="font-size:14px;font-weight:600;color:#1a1a18">Edit — <span id="edit-date-label"></span></div>
      <button onclick="closeEdit()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);line-height:1">×</button>
    </div>
    <div style="font-size:11px;color:#6b6960;margin-bottom:16px">Edit values below. Leave blank or 0 to clear.</div>
    <div id="edit-fields"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
      <button onclick="closeEdit()" style="font-size:12px;color:#6b6960;background:none;border:1px solid #e2e0da;border-radius:6px;padding:6px 14px;cursor:pointer">Cancel</button>
      <button onclick="saveEdit()" style="font-size:12px;color:#fff;background:#1a1a18;border:none;border-radius:6px;padding:6px 18px;font-weight:500;cursor:pointer">Save changes</button>
    </div>
  </div>
</div>

<script>
// ── Edit modal ──
let editContext = null; // {type:'outlet'|'occ', date, key}

function openEditOutlet(date, key) {
  const d = days.find(x => x.date === date);
  if (!d) return;
  const ot = d.outlets[key];
  editContext = { type:'outlet', date, key };
  document.getElementById('edit-date-label').textContent = fmtDateShort(date) + ' — ' + (OUTLETS.find(o=>o.key===key)?.label||key);
  const fields = [
    { k:'breakfast_revenue',      lb:'Breakfast Revenue ($)', full:false },
    { k:'breakfast_covers',       lb:'Breakfast Covers',      full:false },
    { k:'lunch_revenue',          lb:'Lunch Revenue ($)',      full:false },
    { k:'lunch_covers',           lb:'Lunch Covers',          full:false },
    { k:'dinner_revenue',         lb:'Dinner Revenue ($)',     full:false },
    { k:'dinner_covers',          lb:'Dinner Covers',         full:false },
    { k:'other_revenue',          lb:'Other Revenue ($)',      full:false },
    { k:'other_covers',           lb:'Other Covers',          full:false },
    { k:'food_allowances',        lb:'Food Allowances ($)',    full:false },
    { k:'total_food_revenue',     lb:'Total Food Revenue ($)', full:false },
    { k:'beverage_revenue',       lb:'Beverage Revenue ($)',   full:false },
    { k:'beverage_allowances',    lb:'Bev Allowances ($)',     full:false },
    { k:'total_beverage_revenue', lb:'Total Bev Revenue ($)',  full:false },
    { k:'surcharges',             lb:'Surcharges ($)',         full:false },
    { k:'total_revenue',          lb:'Total Revenue ($)',      full:false },
    { k:'total_covers',           lb:'Total Covers',          full:false },
  ];
  document.getElementById('edit-fields').innerHTML =
    '<div class="edit-grid">' +
    fields.map(f =>
      '<div class="edit-field'+(f.full?' full':'')+'"><label>'+f.lb+'</label>' +
      '<input type="number" id="ef-'+f.k+'" value="'+(ot[f.k]||0)+'"></div>'
    ).join('') + '</div>';
  document.getElementById('edit-modal').style.display = 'flex';
}

function openEditOcc(date) {
  const d = occDays.find(x => x.date === date);
  if (!d) return;
  editContext = { type:'occ', date };
  document.getElementById('edit-date-label').textContent = fmtDateShort(date) + ' — Occupancy';
  const fields = [
    { k:'occ',         lb:'Occupancy %'   },
    { k:'rms_sold',    lb:'Rooms Sold'     },
    { k:'trans_rms',   lb:'Trans Rms'      },
    { k:'grp_pkup',    lb:'Grp Pkup Rms'  },
    { k:'adults',      lb:'Adults'         },
    { k:'kids',        lb:'Kids'           },
    { k:'total_guests',lb:'Total Guests'   },
  ];
  document.getElementById('edit-fields').innerHTML =
    '<div class="edit-grid">' +
    fields.map(f =>
      '<div class="edit-field"><label>'+f.lb+'</label>' +
      '<input type="number" id="ef-'+f.k+'" value="'+(d[f.k]||0)+'"></div>'
    ).join('') + '</div>';
  document.getElementById('edit-modal').style.display = 'flex';
}

function closeEdit() {
  document.getElementById('edit-modal').style.display = 'none';
  editContext = null;
}

function gef(id) { return parseFloat(document.getElementById('ef-'+id)?.value)||0; }

function saveEdit() {
  if (!editContext) return;
  if (editContext.type === 'outlet') {
    const d = days.find(x => x.date === editContext.date);
    if (!d) return;
    const ot = d.outlets[editContext.key];
    ['breakfast_revenue','breakfast_covers','lunch_revenue','lunch_covers',
     'dinner_revenue','dinner_covers','other_revenue','other_covers',
     'food_allowances','total_food_revenue','beverage_revenue','beverage_allowances',
     'total_beverage_revenue','surcharges','total_revenue','total_covers'].forEach(k => {
      ot[k] = gef(k);
    });
    saveDays();
  } else if (editContext.type === 'occ') {
    const d = occDays.find(x => x.date === editContext.date);
    if (!d) return;
    d.occ        = gef('occ');
    d.rms_sold   = gef('rms_sold');
    d.trans_rms  = gef('trans_rms');
    d.grp_pkup   = gef('grp_pkup');
    d.adults     = gef('adults');
    d.kids       = gef('kids');
    d.total_guests = gef('total_guests');
    saveOccDays();
  }
  closeEdit();
  renderCurrent();
}

// close on backdrop click
document.getElementById('edit-modal').addEventListener('click', function(e){
  if (e.target === this) closeEdit();
});
</script>
</body>
</html>
