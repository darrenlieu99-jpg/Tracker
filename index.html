<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRD Revenue Tracker — 1 Hotel Melbourne</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efec;
    --border: #e2e0da;
    --border2: #ccc9c0;
    --text: #1a1a18;
    --muted: #6b6960;
    --accent: #1a1a18;
    --radius: 10px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Login ── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .login-card h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .login-card p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }
  .login-card input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 10px;
    outline: none;
    background: var(--bg);
  }
  .login-card input:focus { border-color: var(--accent); }
  .login-card button {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .login-card button:hover { opacity: 0.88; }
  #login-error {
    font-size: 12px;
    color: #c0392b;
    margin-top: 8px;
    min-height: 16px;
  }

  /* ── App ── */
  #app { display: none; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 15px; font-weight: 600; }
  header span { font-size: 12px; color: var(--muted); }
  header button.logout {
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
  }

  main { max-width: 960px; margin: 0 auto; padding: 24px 20px 60px; }

  /* ── Cards ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
  }
  .metric-card .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .metric-card .value { font-size: 18px; font-weight: 600; }
  .metric-card.total .value { color: #1a1a18; }

  /* ── Paste area ── */
  .paste-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
  }
  .paste-section label {
    font-size: 12px;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
  }
  .paste-section textarea {
    width: 100%;
    height: 80px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 8px;
    resize: vertical;
    background: var(--bg);
    outline: none;
  }
  .paste-section textarea:focus { border-color: var(--accent); }
  .paste-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-primary:hover { opacity: 0.85; }
  #status {
    font-size: 12px;
    color: var(--muted);
    flex: 1;
  }
  #status.ok { color: #2e7d32; }
  #status.err { color: #c0392b; }

  /* ── Chart section ── */
  .chart-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 20px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }
  .toggles {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .tog-btn {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--muted);
    transition: all 0.15s;
  }
  .tog-btn .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--border2);
  }
  .chart-wrap { position: relative; width: 100%; height: 280px; }

  /* ── Table ── */
  .table-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .table-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 520px; }
  th {
    text-align: right;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    background: var(--bg);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  th:first-child { text-align: left; }
  td {
    text-align: right;
    padding: 8px 12px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  td:first-child { text-align: left; font-size: 12px; color: var(--muted); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }
  td.total-cell { font-weight: 600; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
  }
  .footer-row span { font-size: 11px; color: var(--muted); }
  .btn-ghost {
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .btn-ghost:hover { border-color: #c0392b; color: #c0392b; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>IRD Revenue Tracker</h1>
    <p>1 Hotel Melbourne</p>
    <input type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">Sign in</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div>
      <h1>IRD Revenue Tracker</h1>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="day-count"></span>
      <button class="logout" onclick="logout()">Sign out</button>
    </div>
  </header>

  <main>
    <!-- Summary cards -->
    <div id="cards" class="card-grid"></div>

    <!-- Paste & extract -->
    <div class="paste-section">
      <label>Paste full DOR sheet here (Ctrl+A → Ctrl+C from Excel, then paste)</label>
      <textarea id="paste-area" placeholder="Paste DOR data..."></textarea>
      <div class="paste-row">
        <button class="btn-primary" onclick="extractAndAdd()">Add day →</button>
        <span id="status"></span>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-section">
      <div class="section-title">Daily revenue</div>
      <div class="toggles" id="toggles"></div>
      <div class="chart-wrap">
        <canvas id="chart" role="img" aria-label="Daily IRD revenue line chart by category"></canvas>
      </div>
    </div>

    <!-- Table -->
    <div class="table-section">
      <div class="table-header">
        <span class="section-title" style="margin:0;">History</span>
      </div>
      <div class="table-wrap">
        <div id="tbl-container"></div>
      </div>
    </div>

    <div class="footer-row">
      <span id="footer-count"></span>
      <button class="btn-ghost" onclick="clearAll()">Clear all data</button>
    </div>
  </main>
</div>

<script>
const PASSWORD = 'IRD@2026!';
const STORE_KEY = 'ird_days_v1';
const SESSION_KEY = 'ird_auth';

const SERIES = [
  { k: 'breakfast_revenue',      lb: 'Breakfast',  co: '#e8960e', d: [] },
  { k: 'lunch_revenue',          lb: 'Lunch',       co: '#1a9e6e', d: [] },
  { k: 'dinner_revenue',         lb: 'Dinner',      co: '#2e7dd4', d: [] },
  { k: 'total_food_revenue',     lb: 'Food total',  co: '#c94a20', d: [5, 3] },
  { k: 'total_beverage_revenue', lb: 'Beverage',    co: '#7060cc', d: [] },
  { k: 'surcharges',             lb: 'Surcharges',  co: '#888880', d: [2, 3] },
  { k: 'total_ird_revenue',      lb: 'Total IRD',   co: '#1a1a18', d: [], w: 2.5 },
];

let active = new Set(SERIES.map(s => s.k));
let chartObj = null;
let days = [];

// ── Auth ──
function checkPw() {
  const v = document.getElementById('pw-input').value;
  if (v === PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('login-error').textContent = 'Incorrect password.';
    document.getElementById('pw-input').value = '';
  }
}

function logout() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ── Storage ──
function loadDays() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    days = raw ? JSON.parse(raw) : [];
    days.sort((a, b) => a.date.localeCompare(b.date));
  } catch(e) { days = []; }
}

function saveDays() {
  localStorage.setItem(STORE_KEY, JSON.stringify(days));
}

// ── Parser ──
function parseNum(s) {
  if (!s) return 0;
  s = s.trim().replace(/,/g, '');
  if (!s || s === '-' || s === '#DIV/0!') return 0;
  if (s.startsWith('(') && s.endsWith(')')) return -(parseFloat(s.slice(1, -1)) || 0);
  return parseFloat(s) || 0;
}

function isMeaningful(s) {
  s = (s || '').trim();
  return s !== '' && s !== '-' && s !== '#DIV/0!';
}

function parseDOR(text) {
  const r = {
    date: null,
    breakfast_covers: 0, breakfast_avg_check: 0, breakfast_revenue: 0,
    lunch_covers: 0, lunch_avg_check: 0, lunch_revenue: 0,
    dinner_covers: 0, dinner_avg_check: 0, dinner_revenue: 0,
    food_allowances: 0, total_food_revenue: 0,
    beverage_revenue: 0, beverage_allowances: 0, total_beverage_revenue: 0,
    surcharges: 0,
    total_ird_covers: 0, total_ird_avg_check: 0, total_ird_revenue: 0
  };

  const dm = text.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (dm) r.date = `${dm[3]}-${dm[1]}-${dm[2]}`;

  const ALL_LABELS = new Set([
    'In-Room Dining', 'Breakfast', 'Lunch', 'Dinner',
    'Less: Food Allowances', 'Total Food Revenue',
    'Beverage Revenue', 'Less: Beverage Allowances',
    'Total Beverage Revenue', 'Total In-Room Dining'
  ]);

  let inIRD = false;
  const lines = text.split(/\r?\n/);

  for (const line of lines) {
    const cells = line.split('\t');
    let labelIdx = -1, label = '';

    for (let i = 0; i < cells.length; i++) {
      const t = cells[i].trim();
      if (ALL_LABELS.has(t) || t.startsWith('Food and Beverage Surcharges')) {
        labelIdx = i; label = t; break;
      }
    }

    if (labelIdx < 0) continue;
    if (label === 'In-Room Dining') { inIRD = true; continue; }
    if (!inIRD) continue;

    const before = cells.slice(0, labelIdx);
    const meaningful = before
      .map(c => ({ v: parseNum(c), s: c.trim() }))
      .filter(x => isMeaningful(x.s));

    if (label === 'Breakfast') {
      r.breakfast_covers = meaningful[0]?.v || 0;
      r.breakfast_avg_check = meaningful[1]?.v || 0;
      r.breakfast_revenue = meaningful[2]?.v || 0;
    } else if (label === 'Lunch') {
      r.lunch_covers = meaningful[0]?.v || 0;
      r.lunch_avg_check = meaningful[1]?.v || 0;
      r.lunch_revenue = meaningful[2]?.v || 0;
    } else if (label === 'Dinner') {
      r.dinner_covers = meaningful[0]?.v || 0;
      r.dinner_avg_check = meaningful[1]?.v || 0;
      r.dinner_revenue = meaningful[2]?.v || 0;
    } else if (label === 'Less: Food Allowances') {
      r.food_allowances = meaningful[0]?.v || 0;
    } else if (label === 'Total Food Revenue') {
      r.total_food_revenue = meaningful[0]?.v || 0;
    } else if (label === 'Beverage Revenue') {
      r.beverage_revenue = meaningful[0]?.v || 0;
    } else if (label === 'Less: Beverage Allowances') {
      r.beverage_allowances = meaningful[0]?.v || 0;
    } else if (label === 'Total Beverage Revenue') {
      r.total_beverage_revenue = meaningful[0]?.v || 0;
    } else if (label.startsWith('Food and Beverage Surcharges')) {
      r.surcharges = meaningful[0]?.v || 0;
    } else if (label === 'Total In-Room Dining') {
      r.total_ird_covers = meaningful[0]?.v || 0;
      r.total_ird_avg_check = meaningful[1]?.v || 0;
      r.total_ird_revenue = meaningful[2]?.v || 0;
      inIRD = false;
    }
  }
  return r;
}

// ── Extract & add ──
function extractAndAdd() {
  const raw = document.getElementById('paste-area').value;
  const st = document.getElementById('status');
  if (!raw.trim()) { setStatus('Paste some data first.', 'err'); return; }

  try {
    const d = parseDOR(raw);
    if (!d.date) { setStatus('Could not find a date — make sure the header rows are included in your paste.', 'err'); return; }
    if (!d.total_ird_revenue && !d.breakfast_revenue && !d.dinner_revenue) {
      setStatus('Parsed but all zeros — make sure the In-Room Dining section is included.', 'err'); return;
    }
    days = days.filter(x => x.date !== d.date);
    days.push(d);
    days.sort((a, b) => a.date.localeCompare(b.date));
    saveDays();
    document.getElementById('paste-area').value = '';
    setStatus(`Added ${d.date} — Total IRD: ${fmt(d.total_ird_revenue)}`, 'ok');
    renderAll();
  } catch(e) {
    setStatus('Parse error: ' + e.message, 'err');
  }
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = type || '';
}

// ── Render ──
const fmt = n => '$' + Math.round(n || 0).toLocaleString();
const fmtD = d => { if (!d) return ''; const [y, m, dy] = d.split('-'); return `${+dy}/${+m}`; };

function renderCards() {
  const el = document.getElementById('cards');
  if (!days.length) { el.innerHTML = ''; return; }
  const last = days[days.length - 1];
  const items = [
    { lb: 'Breakfast', v: fmt(last.breakfast_revenue) },
    { lb: 'Lunch', v: fmt(last.lunch_revenue) },
    { lb: 'Dinner', v: fmt(last.dinner_revenue) },
    { lb: 'Food total', v: fmt(last.total_food_revenue) },
    { lb: 'Beverage', v: fmt(last.total_beverage_revenue) },
    { lb: 'Surcharges', v: fmt(last.surcharges) },
    { lb: 'Total IRD', v: fmt(last.total_ird_revenue), cls: 'total' },
  ];
  el.innerHTML = items.map(i =>
    `<div class="metric-card ${i.cls || ''}">
      <div class="label">${i.lb}</div>
      <div class="value">${i.v}</div>
    </div>`
  ).join('');
}

function renderToggles() {
  const el = document.getElementById('toggles');
  if (!days.length) { el.innerHTML = ''; return; }
  el.innerHTML = SERIES.map(s => {
    const on = active.has(s.k);
    return `<button class="tog-btn" onclick="tog('${s.k}')" style="${on ? `border-color:${s.co};color:${s.co};background:${s.co}18;` : ''}">
      <span class="dot" style="background:${on ? s.co : 'var(--border2)'};"></span>${s.lb}
    </button>`;
  }).join('');
}

function tog(k) {
  active.has(k) ? active.delete(k) : active.add(k);
  renderToggles();
  renderChart();
}

function renderChart() {
  if (!days.length) return;
  const ctx = document.getElementById('chart');
  const datasets = SERIES.filter(s => active.has(s.k)).map(s => ({
    label: s.lb,
    data: days.map(d => Math.round(d[s.k] || 0)),
    borderColor: s.co,
    backgroundColor: s.co + '15',
    borderWidth: s.w || 1.5,
    borderDash: s.d,
    pointRadius: days.length === 1 ? 5 : 3,
    pointHoverRadius: 5,
    tension: 0.3,
    fill: false,
  }));
  if (chartObj) chartObj.destroy();
  chartObj = new Chart(ctx, {
    type: 'line',
    data: { labels: days.map(d => fmtD(d.date)), datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ' ' + c.dataset.label + ': $' + c.parsed.y.toLocaleString() } }
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 11 }, color: '#888', autoSkip: false, maxRotation: 45 }
        },
        y: {
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 11 }, color: '#888', callback: v => '$' + v.toLocaleString() }
        }
      }
    }
  });
}

function renderTable() {
  const el = document.getElementById('tbl-container');
  if (!days.length) {
    el.innerHTML = '<div class="empty-state">No data yet — paste a DOR above to get started.</div>';
    return;
  }
  const cols = ['Bfst $', 'Lunch $', 'Din $', 'Food $', 'Bev $', 'Surcharges', 'Total IRD', 'Covers'];
  const head = '<th>Date</th>' + cols.map(c => `<th>${c}</th>`).join('');
  const rows = [...days].reverse().map(d => {
    const vals = [
      fmt(d.breakfast_revenue), fmt(d.lunch_revenue), fmt(d.dinner_revenue),
      fmt(d.total_food_revenue), fmt(d.total_beverage_revenue), fmt(d.surcharges),
      fmt(d.total_ird_revenue), Math.round(d.total_ird_covers || 0)
    ];
    return `<tr>
      <td>${d.date}</td>
      ${vals.map((v, i) => `<td${i === 6 ? ' class="total-cell"' : ''}>${v}</td>`).join('')}
    </tr>`;
  }).join('');
  el.innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>`;
}

function renderAll() {
  renderCards();
  renderToggles();
  renderChart();
  renderTable();
  const n = days.length;
  const txt = n ? `${n} day${n > 1 ? 's' : ''} tracked` : '';
  document.getElementById('day-count').textContent = txt;
  document.getElementById('footer-count').textContent = txt;
}

function clearAll() {
  if (!confirm('Clear all saved IRD data? This cannot be undone.')) return;
  days = [];
  localStorage.removeItem(STORE_KEY);
  if (chartObj) { chartObj.destroy(); chartObj = null; }
  renderAll();
  setStatus('', '');
}

function init() {
  loadDays();
  renderAll();
}

// ── Boot ──
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  }
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPw();
  });
});
</script>
</body>
</html>
